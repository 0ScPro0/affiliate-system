services:
  affiliate-system-postgres:
    image: postgres:18.4-alpine
    container_name: affiliate-system-postgres
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
    environment:
      - POSTGRES_DB=${DATABASE_POSTGRES_DB}
      - POSTGRES_USER=${DATABASE_POSTGRES_USER}
      - POSTGRES_PASSWORD=${DATABASE_POSTGRES_PASSWORD}
    volumes:
      - ${PROJECT_ROOT}/backend/out/pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  affiliate-system-migrate:
    image: migrate/migrate:v4.19.1
    container_name: affiliate-system-migrate
    volumes:
      - ${PROJECT_ROOT}/backend/migrations:/backend/migrations
    depends_on:
      - affiliate-system-postgres

  affiliate-system-kafka:
    image: apache/kafka:4.3.0
    container_name: affiliate-system-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://affiliate-system-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@affiliate-system-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
    volumes:
      - ${PROJECT_ROOT}/backend/out/kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 3

  affiliate-system-wal-listener:
    image: ihippik/wal-listener:v2.11.0
    container_name: affiliate-system-wal-listener
    depends_on:
      - affiliate-system-kafka
      - affiliate-system-postgres
    environment:
      - WAL_DATABASE_HOST=affiliate-system-postgres
      - WAL_DATABASE_PORT=5432
      - WAL_DATABASE_NAME=${DATABASE_POSTGRES_DB}
      - WAL_DATABASE_USER=${DATABASE_POSTGRES_USER}
      - WAL_DATABASE_PASSWORD=${DATABASE_POSTGRES_PASSWORD}
    volumes:
      - ./backend/internal/core/config/wal-config.yml:/app/config.yml
    command: ["/app/app", "-config", "/app/config.yml"]
    restart: on-failure

  affiliate-system-swagger:
    build:
      context: ${PROJECT_ROOT}
      dockerfile_inline: |
        FROM golang:1.25-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
      - ${PROJECT_ROOT}/backend:/code